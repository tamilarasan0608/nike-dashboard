<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#f5f1ea}
#root{height:100%}
:root{
  --paper:#f5f1ea;--paper-2:#ede8df;--paper-3:#e3ddd0;
  --ink:#14110e;--ink-2:rgba(20,17,14,.62);--ink-3:rgba(20,17,14,.38);
  --rule:rgba(20,17,14,.14);--rule-soft:rgba(20,17,14,.08);
  --accent:#ff4500;--good:#1f7a4d;--bad:#b3261e;--warn:#a86a00;
  --serif:"DM Serif Display","Times New Roman",serif;
  --sans:"Archivo","Helvetica Neue",sans-serif;
  --mono:"JetBrains Mono","SF Mono","Menlo",monospace;
}
.m-root{background:var(--paper);color:var(--ink);font-family:var(--sans);font-feature-settings:"ss01","tnum";-webkit-font-smoothing:antialiased}
.m-mono{font-family:var(--mono);font-feature-settings:"tnum"}
.m-serif{font-family:var(--serif)}
.m-num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.m-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2)}
.m-card{background:var(--paper);border:1px solid var(--rule);position:relative}
.m-tag{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border:1px solid var(--rule);border-radius:2px;line-height:1.1}
.m-tag.live{background:var(--accent);color:#fff;border-color:var(--accent)}
.m-tag.good{background:var(--good);color:#fff;border-color:var(--good)}
.m-tag.bad{background:var(--bad);color:#fff;border-color:var(--bad)}
.m-tag.warn{background:var(--warn);color:#fff;border-color:var(--warn)}
.m-btn{appearance:none;border:1px solid var(--ink);background:var(--paper);color:var(--ink);font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:7px 12px;cursor:pointer;transition:background .15s,color .15s}
.m-btn:hover{background:var(--ink);color:var(--paper)}
.m-btn.primary{background:var(--ink);color:var(--paper)}
.m-btn.primary:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.m-btn.ghost{border-color:var(--rule);color:var(--ink-2)}
.m-btn.ghost:hover{background:transparent;color:var(--ink);border-color:var(--ink)}
.m-input{appearance:none;border:0;border-bottom:1px solid var(--rule);background:transparent;padding:6px 0;font-family:var(--mono);font-size:11px;color:var(--ink);width:100%;outline:none}
.m-input:focus{border-bottom-color:var(--ink)}
.m-input::placeholder{color:var(--ink-3)}
.m-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}
.m-table th{text-align:left;font-weight:500;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-2);padding:8px 10px;border-bottom:1px solid var(--ink);white-space:nowrap}
.m-table td{padding:9px 10px;border-bottom:1px solid var(--rule-soft);vertical-align:middle}
.m-table tbody tr{cursor:pointer;transition:background .12s}
.m-table tbody tr:hover{background:var(--paper-2)}
.m-table tbody tr:hover td{color:var(--ink)}
image-slot{display:block;--image-slot-bg:var(--paper-3);--image-slot-fg:var(--ink-2)}
.m-scroll{overflow:auto;scrollbar-width:none}
.m-scroll::-webkit-scrollbar{display:none}
@keyframes m-pulse{0%,100%{opacity:1}50%{opacity:.35}}
.m-pulse{animation:m-pulse 1.6s ease-in-out infinite}
@keyframes m-marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.m-marquee{display:flex;gap:48px;white-space:nowrap;animation:m-marquee 90s linear infinite}
.m-hero-h{font-family:var(--serif);font-weight:400;line-height:.92;letter-spacing:-.02em}
.m-stripe{background-image:repeating-linear-gradient(135deg,var(--paper-3) 0,var(--paper-3) 8px,var(--paper-2) 8px,var(--paper-2) 16px)}
.m-big-num{font-family:var(--serif);font-size:64px;line-height:.95;letter-spacing:-.02em}
.m-big-num .unit{font-family:var(--mono);font-size:14px;letter-spacing:.08em;color:var(--ink-2);margin-left:4px;vertical-align:super;text-transform:uppercase}
.m-tip{position:absolute;pointer-events:none;background:var(--ink);color:var(--paper);font-family:var(--mono);font-size:10px;padding:6px 8px;white-space:nowrap;transform:translate(-50%,-130%);z-index:10}
.m-tip::after{content:"";position:absolute;left:50%;bottom:-4px;width:0;height:0;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--ink);border-bottom:0}
</style>

r]) .ring{border-color:#c96442}:host([data-filled]) .ring{display:none}.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;white-space:nowrap}:host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl{opacity:1;pointer-events:auto}.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;backdrop-filter:blur(6px)}.ctl button:hover{background:rgba(0,0,0,.8)}.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

/* ── Shared utilities & components ─────────────────────────────────────────── */

const fmt = {

  short:(n)=>{const a=Math.abs(n);if(a>=1e9)return(n/1e9).toFixed(2)+"B";if(a>=1e6)return(n/1e6).toFixed(2)+"M";if(a>=1e3)return(n/1e3).toFixed(1)+"K";return n.toFixed(0);},

function Sparkline({values,width=120,height=36,stroke="var(--ink)",fill,showTip=true,fmtTip}){
  const ref=useRef(null);
  const [hover,setHover]=useState(null);
  const min=Math.min(...values),max=Math.max(...values),range=max-min||1;
  const pad=2,w=width-pad*2,h=height-pad*2,step=w/(values.length-1);
  const points=values.map((v,i)=>[pad+i*step,pad+h-((v-min)/range)*h]);
  const d=points.map((p,i)=>(i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(" ");
  const area=`${d} L${points[points.length-1][0]},${pad+h} L${points[0][0]},${pad+h} Z`;
  const onMove=(e)=>{if(!showTip)return;const rect=ref.current.getBoundingClientRect();const x=e.clientX-rect.left;let idx=Math.round((x-pad)/step);idx=Math.max(0,Math.min(values.length-1,idx));setHover({idx,x:points[idx][0],y:points[idx][1]});};
  return(
    <div ref={ref} style={{position:"relative",width,height}} onMouseMove={onMove} onMouseLeave={()=>setHover(null)}>
      <svg width={width} height={height} style={{display:"block"}}>
        {fill&&<path d={area} fill={fill} opacity="0.18"/>}
        <path d={d} fill="none" stroke={stroke} strokeWidth="1.25"/>
        {hover&&<><line x1={hover.x} y1={pad} x2={hover.x} y2={pad+h} stroke="var(--ink)" strokeWidth="0.5" strokeDasharray="2 2"/><circle cx={hover.x} cy={hover.y} r="3" fill="var(--accent)" stroke="var(--paper)" strokeWidth="1.5"/></>}
      </svg>
      {hover&&<div className="m-tip" style={{left:hover.x,top:hover.y}}>{fmtTip?fmtTip(values[hover.idx],hover.idx):fmt.short(values[hover.idx])}</div>}
    </div>
  );
}

function KpiRow({kpis,cols=6}){

function WorldMap({lanes=[],height=240}){

    const blobs=[{cx:22,cy:36,rx:10,ry:12},{cx:28,cy:60,rx:5,ry:10},{cx:49,cy:32,rx:5,ry:6},{cx:51,cy:50,rx:7,ry:11},{cx:58,cy:32,rx:8,ry:5},{cx:68,cy:44,rx:5,ry:5},{cx:78,cy:42,rx:7,ry:7},{cx:84,cy:64,rx:5,ry:4}];

    for(const b of blobs){const n=Math.floor(b.rx*b.ry*2.0);for(let i=0;i<n;i++){const a=r()*Math.PI*2;const rad=Math.sqrt(r());const x=b.cx+Math.cos(a)*rad*b.rx;const y=b.cy+Math.sin(a)*rad*b.ry;if(x>0&&x<100&&y>0&&y<100)out.push({x,y});}}

    <svg viewBox="0 0 100 70" width="100%" height={height} preserveAspectRatio="xMidYMid meet" style={{display:"block"}}>

function AreaChart({data,width,height,xKey="day",yKey="value",accent}){
  const ref=useRef(null);
  const [hover,setHover]=useState(null);
  const pad={l:36,r:16,t:12,b:24};
  const w=width-pad.l-pad.r,h=height-pad.t-pad.b;
  const min=Math.min(...data.map(d=>d[yKey])),max=Math.max(...data.map(d=>d[yKey])),range=max-min;
  const step=w/(data.length-1);
  const pts=data.map((d,i)=>[pad.l+i*step,pad.t+h-((d[yKey]-min)/range)*h]);
  const path=pts.map((p,i)=>(i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(" ");
  const area=`${path} L${pts[pts.length-1][0]},${pad.t+h} L${pts[0][0]},${pad.t+h} Z`;
  const ticks=4;const ytickVals=Array.from({length:ticks+1},(_,i)=>min+(range*i)/ticks);
  const onMove=e=>{const rect=ref.current.getBoundingClientRect();const x=e.clientX-rect.left;let idx=Math.round((x-pad.l)/step);idx=Math.max(0,Math.min(data.length-1,idx));setHover({idx,x:pts[idx][0],y:pts[idx][1]});};
  return(
    <div ref={ref} style={{position:"relative",width,height}} onMouseMove={onMove} onMouseLeave={()=>setHover(null)}>
      <svg width={width} height={height} style={{display:"block"}}>
        {ytickVals.map((v,i)=>{const y=pad.t+h-((v-min)/range)*h;return(<g key={i}><line x1={pad.l} y1={y} x2={pad.l+w} y2={y} stroke="var(--rule-soft)" strokeWidth=".5"/><text x={pad.l-6} y={y+3} fontSize="9" fontFamily="var(--mono)" fill="var(--ink-2)" textAnchor="end">{fmt.short(v)}</text></g>);})}
        {data.filter((_,i)=>i%Math.floor(data.length/6)===0).map((d,i)=>{const idx=data.indexOf(d);const x=pad.l+idx*step;return(<text key={i} x={x} y={pad.t+h+14} fontSize="9" fontFamily="var(--mono)" fill="var(--ink-2)" textAnchor="middle">{fmt.date(d.date)}</text>);})}
        <path d={area} fill={accent||"var(--accent)"} opacity=".12"/>
        <path d={path} fill="none" stroke={accent||"var(--accent)"} strokeWidth="1.5"/>
        {hover&&<><line x1={hover.x} y1={pad.t} x2={hover.x} y2={pad.t+h} stroke="var(--ink)" strokeWidth=".5" strokeDasharray="3 3"/><circle cx={hover.x} cy={hover.y} r="4" fill="var(--paper)" stroke={accent||"var(--accent)"} strokeWidth="1.5"/></>}
      </svg>
      {hover&&<div className="m-tip" style={{left:hover.x,top:hover.y}}>{fmt.date(data[hover.idx].date)} · ${fmt.short(data[hover.idx][yKey]*1000)}</div>}
    </div>
  );
}

            <div style={{display:"flex",alignItems:"center",gap:8,borderBottom:"1px solid var(--ink)",width:240,paddingBottom:2}}>
              <span className="m-mono" style={{fontSize:10,color:"var(--ink-2)"}}>⌕</span>
              <input className="m-input" style={{border:0}} value={q} placeholder="ID, SKU, customer, region…" onChange={e=>setQ(e.target.value)}/>
            </div>
            <div className="m-mono" style={{fontSize:10,color:"var(--ink-2)",letterSpacing:".08em"}}>{filtered.length} / {D.orders.length} · ${fmt.short(totalValue)}</div>
          </div>
        </div>
        <div className="m-scroll" style={{flex:1,overflow:"auto"}}>
          <table className="m-table">
            <thead style={{position:"sticky",top:0,background:"var(--paper)",zIndex:5}}>
              <tr>
                {[{k:"id",l:"Order",w:110},{k:"sku",l:"SKU",w:220},{k:"customer",l:"Customer",w:170},{k:"region",l:"Region",w:70},{k:"channel",l:"Channel",w:100},{k:"lane",l:"Lane",w:60},{k:"etaDays",l:"ETA",w:60,align:"right"},{k:"qty",l:"Qty",w:70,align:"right"},{k:"value",l:"Value",w:90,align:"right"},{k:"progress",l:"Progress",w:110},{k:"status",l:"Status",w:110}].map(c=>(
                  <th key={c.k} onClick={()=>toggleSort(c.k)} style={{width:c.w,textAlign:c.align||"left",cursor:"pointer",userSelect:"none"}}>
                    <span style={{display:"inline-flex",gap:4,alignItems:"center"}}>{c.l}<span style={{opacity:sort.key===c.k?1:.25,fontSize:8}}>{sort.key===c.k?(sort.dir==="asc"?"▲":"▼"):"▾"}</span></span>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map(o=>(
                <tr key={o.id} onClick={()=>setSelected(o)}>
                  <td style={{color:"var(--ink-2)"}}>{o.id}</td>
                  <td style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.sku}</td>
                  <td style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.customer}</td>
                  <td>{o.region}</td>
                  <td style={{color:"var(--ink-2)"}}>{o.channel}</td>
                  <td style={{color:"var(--ink-2)"}}>{o.lane}</td>
                  <td className="m-num" style={{textAlign:"right"}}>{o.etaDays}d</td>
                  <td className="m-num" style={{textAlign:"right"}}>{fmt.num(o.qty)}</td>
                  <td className="m-num" style={{textAlign:"right"}}>${fmt.short(o.value)}</td>
                  <td>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <div style={{flex:1,height:3,background:"var(--paper-2)",position:"relative"}}>
                        <div style={{position:"absolute",inset:0,width:`${o.progress}%`,background:o.status==="DELAYED"?"var(--bad)":o.status==="FULFILLED"?"var(--good)":"var(--ink)"}}></div>
                      </div>
                      <span className="m-mono m-num" style={{fontSize:9.5,color:"var(--ink-2)",width:26,textAlign:"right"}}>{o.progress}%</span>
                    </div>
                  </td>
                  <td><StatusPill status={o.status}/></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      <Drawer open={!!selected} onClose={()=>setSelected(null)} width={520}>
        {selected&&<OrderDetail order={selected} onClose={()=>setSelected(null)}/>}
      </Drawer>
    </div>
  );
}

function OrderDetail({order,onClose}){
  const stages=[
    {id:"1",label:"Order Placed",done:true,ts:"May 18 · 09:14"},
    {id:"2",label:"Manufactured",done:true,ts:"May 21 · 18:30"},
    {id:"3",label:"Dispatched",done:order.progress>=40,ts:"May 23 · 06:42"},
    {id:"4",label:"In Transit",done:order.progress>=60,ts:order.lane==="AIR"?"AIR · LH8413":"SEA · MAERSK 2207E"},
    {id:"5",label:"Customs Cleared",done:order.progress>=85,ts:order.progress>=85?"Pending":"—"},
    {id:"6",label:"Delivered",done:order.status==="FULFILLED",ts:order.status==="FULFILLED"?"Today · 11:08":"—"},
  ];
  return(
    <>
      <div style={{padding:"20px 24px",borderBottom:"1px solid var(--ink)",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div className="m-eyebrow">Order Detail</div>
          <div className="m-mono" style={{fontSize:14,marginTop:6}}>{order.id}</div>
          <div className="m-serif" style={{fontSize:22,marginTop:8,lineHeight:1}}>{order.sku}</div>
        </div>
        <button onClick={onClose} style={{border:0,background:"transparent",cursor:"pointer",fontSize:18,lineHeight:1,color:"var(--ink-2)"}}>×</button>
      </div>
      <div className="m-scroll" style={{flex:1,overflow:"auto"}}>
        <div style={{padding:"16px 24px",borderBottom:"1px solid var(--rule)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,rowGap:14}}>
            <OField l="Customer" v={order.customer}/><OField l="Status" v={<StatusPill status={order.status}/>}/>
            <OField l="Region" v={order.region}/><OField l="Channel" v={order.channel}/>
            <OField l="Lane" v={order.lane}/><OField l="ETA" v={`${order.etaDays} days`}/>
            <OField l="Quantity" v={fmt.num(order.qty)+" units"}/><OField l="Value" v={`$${fmt.num(order.value)}`}/>
          </div>
        </div>
        <div style={{padding:"16px 24px",borderBottom:"1px solid var(--rule)"}}>
          <div className="m-eyebrow" style={{marginBottom:8}}>Item</div>
          <image-slot id={`order-img-${order.id}`} shape="rect" placeholder={`PRODUCT IMAGE — ${order.sku}`} style={{width:"100%",height:200,display:"block"}}></image-slot>
        </div>
        <div style={{padding:"16px 24px",borderBottom:"1px solid var(--rule)"}}>
          <div className="m-eyebrow" style={{marginBottom:14}}>Pipeline / Status</div>
          <div style={{display:"flex",flexDirection:"column",gap:0}}>
            {stages.map((s,i)=>(
              <div key={s.id} style={{display:"grid",gridTemplateColumns:"20px 1fr auto",gap:12,alignItems:"center",padding:"8px 0",position:"relative"}}>
                <div style={{width:12,height:12,border:"1.5px solid "+(s.done?"var(--ink)":"var(--rule)"),background:s.done?"var(--accent)":"transparent",borderRadius:0,position:"relative",zIndex:1}}></div>
                {i<stages.length-1&&<div style={{position:"absolute",left:5,top:20,bottom:-4,width:2,background:s.done?"var(--ink)":"var(--rule)"}}></div>}
                <div className="m-mono" style={{fontSize:11,color:s.done?"var(--ink)":"var(--ink-3)"}}>{s.label}</div>
                <div className="m-mono" style={{fontSize:10,color:"var(--ink-2)",letterSpacing:".06em"}}>{s.ts}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{padding:"16px 24px"}}>
          <div className="m-eyebrow" style={{marginBottom:10}}>Documents</div>
          <div style={{display:"flex",flexDirection:"column",gap:0}}>
            {[["INV-"+order.id.slice(3),"Commercial Invoice","PDF · 184 KB"],["BOL-"+order.id.slice(3),"Bill of Lading","PDF · 92 KB"],["PCK-"+order.id.slice(3),"Packing List","PDF · 56 KB"]].map(([id,label,meta])=>(
              <div key={id} style={{padding:"10px 0",borderBottom:"1px solid var(--rule-soft)",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                <div><div className="m-mono" style={{fontSize:11}}>{id}</div><div className="m-mono" style={{fontSize:9.5,color:"var(--ink-2)",letterSpacing:".08em",textTransform:"uppercase",marginTop:2}}>{label}</div></div>
                <div className="m-mono" style={{fontSize:9.5,color:"var(--ink-2)"}}>{meta}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{padding:"16px 24px",borderTop:"1px solid var(--ink)",display:"flex",gap:8,background:"var(--paper-2)"}}>
        <button className="m-btn ghost" style={{flex:1}}>Flag</button>
        <button className="m-btn ghost" style={{flex:1}}>Reroute</button>
        <button className="m-btn primary" style={{flex:1}}>Open Full</button>
      </div>
    </>
  );
}

function OField({l,v}){
  return(<div><div className="m-eyebrow">{l}</div><div className="m-mono" style={{fontSize:12,marginTop:4}}>{v}</div></div>);
}

/* ── Campaigns screen ──────────────────────────────────────────────────────── */
function CampaignsScreen(){
  const D=window.MERIDIAN_DATA;
  const [filter,setFilter]=useState("ALL");
  const tabs=["ALL","LIVE","SCHEDULED","ENDING","ARCHIVED"];
  const filtered=filter==="ALL"?D.campaigns:D.campaigns.filter(c=>c.status===filter);
  return(
    <div className="m-root" style={{display:"grid",gridTemplateColumns:"220px 1fr",height:"100%",overflow:"hidden"}}>
      <SideNav current="campaigns"/>
      <div style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"20px 28px 16px",borderBottom:"1px solid var(--ink)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
            <div>
              <div className="m-eyebrow">04 / Campaigns</div>
              <h1 className="m-serif" style={{fontSize:44,margin:"8px 0 0",lineHeight:.95,letterSpacing:"-.02em"}}>Brand <em style={{color:"var(--accent)"}}>in motion</em>.</h1>
            </div>
            <div style={{display:"flex",gap:12}}>
              <button className="m-btn">Calendar view</button>
              <button className="m-btn primary">+ New Campaign</button>
            </div>
          </div>
        </div>
        <section style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",borderBottom:"1px solid var(--ink)"}}>
          {[{label:"Live Now",val:"2",unit:"campaigns",color:"var(--accent)"},{label:"Total Spend",val:"$6.72",unit:"M USD"},{label:"Reach",val:"63.9",unit:"M unique"},{label:"Avg. CTR",val:"4.2",unit:"%"},{label:"Conv. Rate",val:"3.0",unit:"%"}].map((s,i,arr)=>(
            <div key={i} style={{padding:"20px 24px",borderRight:i<arr.length-1?"1px solid var(--rule)":"none"}}>
              <div className="m-eyebrow">{s.label}</div>
              <div className="m-big-num m-num" style={{fontSize:40,marginTop:10,color:s.color||"var(--ink)"}}>{s.val}<span className="unit">{s.unit}</span></div>
            </div>
          ))}
        </section>
        <div style={{padding:"10px 28px",borderBottom:"1px solid var(--ink)",display:"flex",gap:4,background:"var(--paper-2)"}}>
          {tabs.map(t=>{const active=t===filter;const count=t==="ALL"?D.campaigns.length:D.campaigns.filter(c=>c.status===t).length;return(
            <button key={t} onClick={()=>setFilter(t)} className="m-mono"
              style={{padding:"5px 10px",border:"1px solid "+(active?"var(--ink)":"var(--rule)"),background:active?"var(--ink)":"transparent",color:active?"var(--paper)":"var(--ink-2)",fontSize:10,letterSpacing:".1em",textTransform:"uppercase",cursor:"pointer",display:"inline-flex",gap:8,alignItems:"center"}}>
              <span>{t}</span><span style={{opacity:.6,fontSize:9}}>{count}</span>
            </button>
          );})}
        </div>
        <div className="m-scroll" style={{flex:1,overflow:"auto"}}>
          {filtered.map((c,idx)=><CampaignRow key={c.id} c={c} idx={idx}/>)}
        </div>
      </div>
    </div>
  );
}

function CampaignRow({c,idx}){
  const engagement=Array.from({length:28},(_,i)=>{const base=c.reach/28*1000;return base*(.7+.6*Math.sin(i*.6+idx)+Math.random()*.4);});
  return(
    <article style={{display:"grid",gridTemplateColumns:"260px 1fr 340px",borderBottom:"1px solid var(--rule)",minHeight:220}}>
      <div style={{borderRight:"1px solid var(--rule)",position:"relative"}}>
        <image-slot id={`camp-${c.id}`} shape="rect" placeholder={`KEY ART — ${c.name}`} style={{width:"100%",height:"100%",display:"block"}}></image-slot>
        <div style={{position:"absolute",top:12,left:12,pointerEvents:"none"}}><StatusPill status={c.status}/></div>
      </div>
      <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",justifyContent:"space-between",borderRight:"1px solid var(--rule)"}}>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
            <div className="m-mono" style={{fontSize:10,color:"var(--ink-2)",letterSpacing:".1em"}}>{c.id}</div>
            <div className="m-mono" style={{fontSize:10,color:"var(--ink-2)",letterSpacing:".08em",textTransform:"uppercase"}}>{c.daysLeft>0?`${c.daysLeft}d / ${c.days}d remaining`:`${c.days}d total`}</div>
          </div>
          <h3 className="m-serif" style={{fontSize:28,lineHeight:1,letterSpacing:"-.01em",margin:0}}>{c.name}</h3>
          <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>{c.channels.map(ch=><span key={ch} className="m-tag">{ch}</span>)}</div>
        </div>
        <div style={{marginTop:16}}>
          <div style={{height:4,background:"var(--paper-2)",position:"relative"}}><div style={{position:"absolute",inset:0,width:`${((c.days-c.daysLeft)/c.days)*100}%`,background:c.status==="LIVE"?"var(--accent)":c.status==="ENDING"?"var(--warn)":"var(--ink)"}}></div></div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
            <span className="m-mono" style={{fontSize:9.5,color:"var(--ink-2)",letterSpacing:".08em"}}>START</span>
            <span className="m-mono" style={{fontSize:9.5,color:"var(--ink-2)",letterSpacing:".08em"}}>END</span>
          </div>
        </div>
      </div>
      <div style={{padding:"20px 24px",display:"grid",gridTemplateRows:"auto 1fr",gap:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:0}}>
          <CMetric label="Spend" val={`$${c.spend.toFixed(2)}M`}/>
          <CMetric label="Reach" val={`${c.reach.toFixed(1)}M`}/>
          <CMetric label="CTR" val={`${c.ctr.toFixed(1)}%`}/>
          <CMetric label="Conv." val={`${c.conv.toFixed(1)}%`}/>
        </div>
        <div style={{marginTop:4}}>
          <div className="m-eyebrow" style={{marginBottom:6}}>Engagement / 28d</div>
          <Sparkline values={engagement} width={300} height={48} stroke={c.status==="LIVE"?"var(--accent)":"var(--ink)"} fill={c.status==="LIVE"?"var(--accent)":"var(--ink)"} fmtTip={v=>fmt.short(v)+" imp."}/>
        </div>
      </div>
    </article>
  );
}

function CMetric({label,val}){
  return(
    <div style={{borderRight:"1px solid var(--rule-soft)",paddingRight:12}}>
      <div className="m-eyebrow">{label}</div>
      <div className="m-mono m-num" style={{fontSize:18,marginTop:4}}>{val}</div>
    </div>
  );
}

/* ── Tweaks panel ──────────────────────────────────────────────────────────── */
const FONT_THEMES={
  editorial:{serif:'"DM Serif Display","Times New Roman",serif',sans:'"Archivo","Helvetica Neue",sans-serif',mono:'"JetBrains Mono","SF Mono","Menlo",monospace'},
  humanist:{serif:'"Spectral","Times New Roman",serif',sans:'"Space Grotesk","Helvetica Neue",sans-serif',mono:'"Space Mono","SF Mono","Menlo",monospace'},
  terminal:{serif:'"IBM Plex Serif","Times New Roman",serif',sans:'"IBM Plex Sans","Helvetica Neue",sans-serif',mono:'"IBM Plex Mono","SF Mono","Menlo",monospace'},
};
const ACCENT_PRESETS=["#ff4500","#0057ff","#00b359","#9b30ff","#e8a000","#14110e"];

function TweaksPanel(){
  const [open,setOpen]=useState(false);
  const [fontTheme,setFontTheme]=useState("editorial");
  const [accent,setAccent]=useState("#ff4500");

  useEffect(()=>{
    const t=FONT_THEMES[fontTheme];
    const root=document.documentElement;
    root.style.setProperty("--serif",t.serif);
    root.style.setProperty("--sans",t.sans);
    root.style.setProperty("--mono",t.mono);
    root.style.setProperty("--accent",accent);
  },[fontTheme,accent]);

  return(
    <>
      <button onClick={()=>setOpen(o=>!o)}
        style={{position:"fixed",bottom:20,right:20,zIndex:100,background:"var(--ink)",color:"var(--paper)",border:"none",padding:"8px 14px",fontFamily:"var(--mono)",fontSize:10,letterSpacing:".12em",textTransform:"uppercase",cursor:"pointer"}}>
        {open?"✕ Close":"⚙ Tweaks"}
      </button>
      {open&&(
        <div style={{position:"fixed",bottom:60,right:20,zIndex:99,background:"var(--paper)",border:"1px solid var(--ink)",padding:20,width:240,boxShadow:"4px 4px 0 var(--ink)"}}>
          <div className="m-eyebrow" style={{marginBottom:12}}>Typography</div>
          <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:20}}>
            {Object.keys(FONT_THEMES).map(k=>(
              <button key={k} onClick={()=>setFontTheme(k)}
                style={{padding:"6px 10px",border:"1px solid "+(fontTheme===k?"var(--ink)":"var(--rule)"),background:fontTheme===k?"var(--ink)":"transparent",color:fontTheme===k?"var(--paper)":"var(--ink)",fontFamily:"var(--mono)",fontSize:10,letterSpacing:".1em",textTransform:"uppercase",cursor:"pointer",textAlign:"left"}}>
                {k}
              </button>
            ))}
          </div>
          <div className="m-eyebrow" style={{marginBottom:12}}>Accent color</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {ACCENT_PRESETS.map(c=>(
              <button key={c} onClick={()=>setAccent(c)}
                style={{width:28,height:28,background:c,border:accent===c?"2px solid var(--ink)":"2px solid transparent",cursor:"pointer",outline:accent===c?"2px solid var(--paper)":"none",outlineOffset:-4}}>
              </button>
            ))}
          </div>
        </div>
      )}
    </>
  );
}

/* ── App root ──────────────────────────────────────────────────────────────── */
function App(){
  const [screen,setScreen]=useState("overview");
  useEffect(()=>{ window.__setScreen=setScreen; },[]);
  const screens={overview:OverviewScreen,sales:SalesScreen,orders:OrdersScreen,campaigns:CampaignsScreen};
  const Screen=screens[screen]||OverviewScreen;
  return(
    <>
      <div style={{height:"100%"}}>
        <Screen/>
      </div>
      <TweaksPanel/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
